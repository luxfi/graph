name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Unit tests
        run: CGO_ENABLED=1 go test ./... -count=1 -race

      - name: E2E tests (SQLite)
        run: CGO_ENABLED=1 go test -tags=e2e ./e2e/ -count=1 -v

      - name: E2E tests (in-memory fallback)
        run: CGO_ENABLED=0 go test -tags="e2e nosqlite" ./e2e/ -count=1 -v

      - name: Benchmarks
        run: CGO_ENABLED=1 go test -tags=e2e -bench=. -benchmem -run='^$' ./e2e/ -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
